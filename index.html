<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skraffle | Year-Round Art Exchange</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">

<style>
body {
    padding: 20px;
    max-width: 800px;
    margin: 0 auto;
}

.hidden {
    display: none;
}

.attack-card {
    border: 1px solid #ccc;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 8px;
}

.attack-card img {
    max-width: 100%;
    border-radius: 6px;
}
</style>
</head>

<body>

<header>
<nav>
<ul><li><strong>✏️ Skraffle</strong></li></ul>
<ul>
<li id="user-status">Loading...</li>
<li><button id="logout-btn" class="secondary hidden">Logout</button></li>
</ul>
</nav>
</header>

<main>

<section id="auth-section">
<h2>Login / Signup</h2>

<form id="auth-form">

<label>Email</label>
<input type="email" id="email" required>

<label>Username</label>
<input type="text" id="username" minlength="3" maxlength="20" required>

<label>Display Name</label>
<input type="text" id="display-name" maxlength="50" required>

<label>Password</label>
<input type="password" id="password" required>

<div class="grid">
<button type="submit">Log In</button>
<button type="button" id="signup-btn" class="secondary">Sign Up</button>
</div>

</form>
</section>

<!-- APP -->
<section id="app-section" class="hidden">

<article>
<h3>Post Attack</h3>

<form id="attack-form">

<label>Title</label>
<input type="text" id="title" required>

<label>Image URL</label>
<input type="url" id="image-url" required>

<label>Points</label>
<input type="number" id="points" value="10" required>

<button type="submit">Post</button>

</form>
</article>

<h2>Feed</h2>
<div id="feed">
<p>No posts yet.</p>
</div>

</section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>

</body>
</html>
